# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# .github/workflows/maven-ci.yml
name: Java Maven CI

# 触发条件：推送到 main 或 master 分支时，或发起 Pull Request 时
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    # 运行环境：使用 Ubuntu 最新版
    runs-on: ubuntu-latest

    # 定义 Maven 需要缓存的依赖路径，加速后续构建
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 环境（这里使用 JDK 8，可根据项目修改）
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'  # 推荐使用 Eclipse Temurin

      # 3. 缓存 Maven 本地仓库，避免重复下载依赖
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # 4. 编译并打包项目（跳过测试，如果需要完整构建可改为 mvn package）
      - name: Build with Maven
        run: mvn clean compile

      # 5. 运行单元测试（如果测试失败，流水线会中断）
      - name: Run tests
        run: mvn test

      # 6. 打包 JAR 文件（可选，可根据需要保留）
      - name: Package JAR
        run: mvn package -DskipTests

      # 7. 上传打包好的 JAR 文件作为构建产物（可选）
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-jar
          path: target/*.jar
